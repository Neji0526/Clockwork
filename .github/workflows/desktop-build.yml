name: Build ClockWork Desktop

# Builds all three installers on their native OS runners (macOS .dmg can only be
# produced on a macOS runner), then publishes them to a GitHub Release so the
# web app can link to stable download URLs.
#
# Trigger: push a tag like `desktop-v1.0.0`, or run manually (Actions -> Run).
on:
  workflow_dispatch: {}
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write # needed to create/update the Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-22.04 (not ubuntu-latest/24.04): electron-builder's AppImage
        # tooling reliably fails on 24.04. 22.04 is the known-good runner.
        os: [windows-latest, macos-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux packaging deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools fakeroot

      - name: Install dependencies
        run: npm install

      - name: Build distributable
        # NOTE: do NOT pass a GitHub token here. electron-builder auto-publishes
        # on CI when a token + tag are present, and with no publish config that
        # step fails. We publish separately in the `release` job below, so force
        # publishing off here.
        run: npm run build -- --publish never
        env:
          # We don't ship Apple/Windows code-signing certs — don't try to sign.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installers (workflow artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: clockwork-${{ matrix.os }}
          path: |
            desktop/dist/*.exe
            desktop/dist/*.dmg
            desktop/dist/*.AppImage
            desktop/dist/*.deb
          if-no-files-found: ignore

  release:
    # Publish a single Release with every OS's installer, only for tag pushes.
    # `always()` so that if one OS leg fails, we still publish the installers
    # that DID build (a single flaky platform never blocks the others).
    needs: build
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ClockWork Desktop ${{ github.ref_name }}
          files: artifacts/**/*
          fail_on_unmatched_files: false
