name: Build ClockWork Desktop

# Builds all three installers on their native OS runners. macOS .dmg can only be
# produced on a macOS runner (Apple tooling), which is why this matrix exists.
on:
  workflow_dispatch: {}
  push:
    tags:
      - "desktop-v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build distributable
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: clockwork-${{ matrix.os }}
          path: |
            desktop/dist/*.exe
            desktop/dist/*.dmg
            desktop/dist/*.AppImage
            desktop/dist/*.deb
          if-no-files-found: ignore
